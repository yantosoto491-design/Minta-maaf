<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maafin Aku</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(135deg, #fce4ec 0%, #e8d5f5 40%, #d6eaff 100%);
      overflow: hidden;
      position: relative;
      text-align: center;
      padding: 20px;
    }

    /* Soft background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: #f48fb1;
      top: -100px; left: -100px;
    }
    body::after {
      width: 350px; height: 350px;
      background: #ce93d8;
      bottom: -80px; right: -80px;
    }

    /* ── Trigger Button ── */
    #triggerBtn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      padding: 16px 40px;
      font-size: 20px;
      border: none;
      border-radius: 50px;
      background: white;
      color: #e91e8c;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(255,255,255,0.75), 0 4px 18px rgba(233,30,140,0.2);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      z-index: 1;
    }
    #triggerBtn:hover { transform: scale(1.08); }

    /* ── Main Card ── */
    .card {
      display: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 32px;
      padding: 48px 44px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(244,143,177,0.18),
        0 2px 8px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.8);
      position: relative;
      z-index: 1;
    }
    .card.visible {
      display: block;
      animation: cardIn 0.65s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .emoji-top {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 900;
      color: #e91e8c;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .card p {
      font-size: 1rem;
      color: #5a4060;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
    }

    .btn-group button {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      border-radius: 50px;
      padding: 14px 28px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      transform-origin: center;
    }

    #yesBtn {
      background: linear-gradient(135deg, #f06292, #e91e8c);
      color: #fff;
      box-shadow: 0 4px 18px rgba(233,30,140,0.35);
    }
    #yesBtn:hover { box-shadow: 0 6px 24px rgba(233,30,140,0.5); }

    #noBtn {
      background: #f3e5f5;
      color: #7b5ea7;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    #noBtn:hover { background: #ede0f5; }

    /* ── Confetti ── */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 60;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); }
    }

    /* ── Hearts container ── */
    #heartsContainer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
    .heart {
      position: absolute;
      font-size: 1.6rem;
      animation: floatUp 2s ease-out forwards;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      80%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-220px) scale(0.4) rotate(20deg); }
    }

    /* ── Popup overlay ── */
    #popupOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(180,100,160,0.25);
      backdrop-filter: blur(6px);
      z-index: 40;
      align-items: center;
      justify-content: center;
    }
    #popupOverlay.active { display: flex; animation: fadeIn 0.3s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    .popup {
      background: rgba(255,255,255,0.95);
      border-radius: 28px;
      padding: 44px 40px;
      max-width: 380px;
      width: 88%;
      text-align: center;
      box-shadow: 0 16px 60px rgba(233,30,140,0.2);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      border: 1.5px solid rgba(255,255,255,0.9);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .popup-emoji { font-size: 56px; display: block; margin-bottom: 12px; }
    .popup h2 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #e91e8c;
      margin-bottom: 10px;
    }
    .popup p {
      font-size: 0.95rem;
      color: #6d4c7a;
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <!-- Step 1: Trigger button -->
  <button id="triggerBtn" onclick="openSurprise()">aku mau ngomong </button>

  <!-- Step 2: Apology card (hidden until button click) -->
  <div class="card" id="card">
    <span class="emoji-top"></span>
    <h1>Aku minta maaf</h1>
    <p>
      Aku gak bermaksud bikin kamu kesel.<br/>
      Maafin aku, ya? 
    </p>
    <div class="btn-group">
      <button id="yesBtn">Maafin 💝</button>
      <button id="noBtn">Enggak 😒</button>
    </div>
  </div>

  <!-- Hearts layer -->
  <div id="heartsContainer"></div>

  <!-- Forgiven popup -->
  <div id="popupOverlay">
    <div class="popup">
      <span class="popup-emoji">💗</span>
      <h2>Yay! Makasih udah maafin 💝</h2>
      <p>Aku janji bakal ngulangin lagi 😝🤭</p>
    </div>
  </div>

  <!-- Audio -->
  <audio id="music" loop>
    <source src="ssstik.io_1777292554411.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    // ── Step 1: Open surprise ──
    function openSurprise() {
      // Hide trigger button
      document.getElementById('triggerBtn').style.display = 'none';

      // Show apology card
      const card = document.getElementById('card');
      card.classList.add('visible');

      // Play music
      document.getElementById('music').play().catch(() => {});

      // Launch confetti
      for (let i = 0; i < 40; i++) {
        const conf = document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.background = `hsl(${Math.random()*360},100%,60%)`;
        conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 5000);
      }
    }

    // ── Step 2: Apology card logic ──
    const noBtn  = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const overlay = document.getElementById('popupOverlay');
    const heartsContainer = document.getElementById('heartsContainer');

    let noScale  = 1.0;
    let yesScale = 1.0;

    noBtn.addEventListener('mouseenter', () => {
      noScale  = Math.max(0.35, noScale  - 0.18);
      yesScale = Math.min(1.9,  yesScale + 0.18);
      noBtn.style.transform  = `scale(${noScale})`;
      yesBtn.style.transform = `scale(${yesScale})`;
    });

    noBtn.addEventListener('mousemove', (e) => {
      const rect = noBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 60) {
        noBtn.style.position = 'relative';
        noBtn.style.left = `${Math.max(-60, Math.min(60, -dx * 1.5))}px`;
        noBtn.style.top  = `${Math.max(-30, Math.min(30, -dy * 1.5))}px`;
      }
    });

    yesBtn.addEventListener('click', () => {
      overlay.classList.add('active');
      generateHearts();
      yesScale = 1.0; noScale = 1.0;
      yesBtn.style.transform = 'scale(1)';
      noBtn.style.transform  = 'scale(1)';
      noBtn.style.left = '0'; noBtn.style.top = '0';
      setTimeout(() => overlay.classList.remove('active'), 5500);
    });

    overlay.addEventListener('click', () => overlay.classList.remove('active'));

    function generateHearts() {
      const emojis = ['💝','💗','💖','💕','🩷','❤️','💓'];
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left  = `${Math.random() * 85 + 5}%`;
        heart.style.bottom = `${Math.random() * 30 + 10}%`;
        heart.style.fontSize = `${Math.random() * 1.2 + 1}rem`;
        heart.style.animationDelay = `${Math.random() * 0.6}s`;
        heart.style.animationDuration = `${Math.random() * 0.8 + 1.6}s`;
        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 2600);
      }
    }
  </script>
</body>
</html>
